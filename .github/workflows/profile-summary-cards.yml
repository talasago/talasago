name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 0 * * *" # once a day
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-slim
    name: generate-github-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Dedicated fine-grained PAT scoped only to this repo
          # (Contents: read and write), used solely so the generated cards
          # can be pushed as this account. main is protected by a ruleset
          # whose bypass list only exempts the repository admin, not the
          # github-actions bot that the default GITHUB_TOKEN pushes as.
          # Kept separate from SUMMARY_GITHUB_TOKEN below, which exists only
          # to read private commit data and should not also carry push
          # authority.
          token: ${{ secrets.CARD_PUSH_TOKEN }}
      - uses: vn7n24fzkq/github-profile-summary-cards@89776cd44fb40c4f7b3e5c2db993728cd700d638 # release
        env:
          # Requires a PAT with the `repo` scope (classic) or read access to
          # private repositories (fine-grained), stored as the
          # SUMMARY_GITHUB_TOKEN repo secret. Read-only is enough; this
          # token is only used to fetch private commit/contribution data,
          # not to push. The account must also have "Include private
          # contributions on my profile" enabled at
          # https://github.com/settings/profile, otherwise private commits
          # are still excluded even with a valid token.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN }}
        with:
          USERNAME: talasago
          THEME: nord_dark
          EXCLUDE: TeX,HTML,CSS,C++
          UTC_OFFSET: 9
